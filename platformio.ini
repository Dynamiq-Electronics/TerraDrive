; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3usbotg]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip #this guy contains the latest update as of 31st of May
board = esp32s3usbotg
framework = arduino
lib_deps = adafruit/Adafruit NeoPixel@^1.15.5

monitor_speed = 115200

build_unflags = -std=gnu++11 # Removes the Arduino library force to CPP11
build_flags = 
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-std=gnu++17 # set the compiler to CPP17 which is the standard.